<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storypoint Calculator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f5f5;
            color: #333;
        }
        h1 { font-size: 1.4rem; margin-bottom: 8px; }
        .hint {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 300px;
            padding: 12px;
            font-family: monospace;
            font-size: 0.95rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            resize: vertical;
        }
        textarea:focus { outline: none; border-color: #4a90d9; }
        .controls {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 16px 0;
        }
        label { font-size: 0.95rem; }
        input[type="number"] {
            width: 100px;
            padding: 8px 12px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
        input[type="number"]:focus { outline: none; border-color: #4a90d9; }
        button {
            padding: 10px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            background: #4a90d9;
            color: #fff;
            cursor: pointer;
        }
        button:hover { background: #3a7bc8; }
        .results {
            margin-top: 20px;
            display: none;
        }
        .results table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
        }
        th {
            background: #4a90d9;
            color: #fff;
            font-weight: 600;
        }
        tr:nth-child(even) { background: #f9f9f9; }
        td:nth-child(2), td:nth-child(3),
        th:nth-child(2), th:nth-child(3) { text-align: right; }
    </style>
</head>
<body>
    <h1>Storypoint Calculator</h1>
    <p class="hint">Use <code>(n)</code> <code>[n]</code> <code>{n}</code> <code>&lt;n&gt;</code> to mark storypoints in your text. Each bracket type is summed separately.</p>

    <textarea id="input" placeholder="Paste your text with storypoint estimates here...
Example:
As a user I want to login (3)
As a user I want to reset my password (5)
Backend API [8]"></textarea>

    <div class="controls">
        <label for="cost">Cost per point (EUR):</label>
        <input type="number" id="cost" value="1000">
        <button id="calc">Calculate</button>
    </div>

    <div class="results" id="results">
        <table>
            <thead>
                <tr><th>Bracket</th><th>Points</th><th>Cost (EUR)</th></tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <script>
        const patterns = [
            { label: "( )", regex: /\((\d+)\)/g },
            { label: "[ ]", regex: /\[(\d+)\]/g },
            { label: "{ }", regex: /\{(\d+)\}/g },
            { label: "< >", regex: /<(\d+)>/g }
        ];

        document.getElementById("calc").addEventListener("click", () => {
            const text = document.getElementById("input").value;
            const cost = parseInt(document.getElementById("cost").value) || 0;
            const tbody = document.getElementById("tbody");
            tbody.innerHTML = "";

            let hasResults = false;
            for (const p of patterns) {
                const matches = [...text.matchAll(p.regex)];
                if (matches.length === 0) continue;
                hasResults = true;
                const points = matches.reduce((sum, m) => sum + parseInt(m[1]), 0);
                const tr = document.createElement("tr");
                tr.innerHTML = `<td>${p.label}</td><td>${points} PTS</td><td>${(points * cost).toLocaleString("de-DE")} EUR</td>`;
                tbody.appendChild(tr);
            }

            if (!hasResults) {
                tbody.innerHTML = '<tr><td colspan="3">No storypoint markers found in text.</td></tr>';
            }

            document.getElementById("results").style.display = "block";
        });
    </script>
</body>
</html>
