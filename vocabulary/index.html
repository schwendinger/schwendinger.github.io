<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Vocabel Trainer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 500px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f5f5;
            color: #333;
        }
        h1 { font-size: 1.4rem; margin-bottom: 16px; text-align: center; }

        /* Mode menu */
        .menu {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .menu button {
            padding: 8px 16px;
            font-size: 0.9rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: #fff;
            color: #333;
            cursor: pointer;
            transition: all 0.15s;
        }
        .menu button:hover { border-color: #4a90d9; color: #4a90d9; }
        .menu button.active {
            background: #4a90d9;
            border-color: #4a90d9;
            color: #fff;
        }

        /* Set picker */
        .set-picker {
            text-align: center;
            margin-bottom: 16px;
        }
        .set-picker select {
            padding: 8px 16px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: #fff;
            color: #333;
            outline: none;
            cursor: pointer;
        }
        .set-picker select:focus { border-color: #4a90d9; }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 32px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }
        .direction {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 8px;
        }
        .word {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 24px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #4a90d9; }
        input.correct { border-color: #4caf50; background: #e8f5e9; }
        input.wrong { border-color: #e53935; background: #ffebee; }
        .feedback {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            min-height: 1.4em;
        }
        .feedback.wrong-feedback {
            background: #ffebee;
            color: #c62828;
            border: 2px solid #e53935;
        }
        .feedback.correct-feedback {
            background: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #4caf50;
        }
        .feedback:empty { display: none; }
        .stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 20px;
            font-size: 0.95rem;
        }
        .stats span { font-weight: 600; }
        .correct-count { color: #4caf50; }
        .wrong-count { color: #e53935; }
        .progress {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #888;
        }
        .results { text-align: center; }
        .results h2 { font-size: 1.3rem; margin-bottom: 16px; }
        .percentage {
            font-size: 3rem;
            font-weight: 700;
            margin: 16px 0;
        }
        .percentage.good { color: #4caf50; }
        .percentage.ok { color: #ff9800; }
        .percentage.bad { color: #e53935; }
        .result-detail {
            font-size: 1rem;
            color: #666;
            margin-bottom: 24px;
        }
        button.action {
            padding: 12px 32px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            background: #4a90d9;
            color: #fff;
            cursor: pointer;
        }
        button.action:hover { background: #3a7bc8; }

        /* Flashcard */
        .flashcard-inner {
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }
        .flashcard-hint {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 16px;
        }
        .flashcard-answer {
            font-size: 1.4rem;
            color: #4a90d9;
            font-weight: 600;
            margin-top: 12px;
            min-height: 1.6em;
        }
        .flashcard-nav {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        .flashcard-nav button {
            padding: 10px 24px;
            font-size: 0.95rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: #fff;
        }
        .btn-knew { background: #4caf50; }
        .btn-knew:hover { background: #43a047; }
        .btn-didnt { background: #e53935; }
        .btn-didnt:hover { background: #d32f2f; }

        /* Quiz */
        .choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 8px;
        }
        .choices button {
            padding: 14px 12px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: #fff;
            color: #333;
            cursor: pointer;
            transition: all 0.15s;
        }
        .choices button:hover:not(:disabled) { border-color: #4a90d9; background: #f0f7ff; }
        .choices button.choice-correct {
            border-color: #4caf50;
            background: #e8f5e9;
            color: #2e7d32;
            font-weight: 600;
        }
        .choices button.choice-wrong {
            border-color: #e53935;
            background: #ffebee;
            color: #c62828;
        }

        /* Irregular verbs */
        .verb-inputs {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
            text-align: left;
        }
        .verb-input { display: flex; flex-direction: column; gap: 4px; }
        .verb-input label {
            font-size: 0.8rem;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .verb-input .given {
            padding: 12px 16px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: #f0f7ff;
            color: #4a90d9;
            font-weight: 600;
        }

        .btn-next {
            margin-top: 16px;
            background: #888;
        }
        .btn-next:hover { background: #666; }
    </style>
</head>
<body>
    <h1>Family Vocabel Trainer</h1>

    <div class="set-picker" id="setPicker"></div>

    <div class="menu" id="menu">
        <button data-mode="type" class="active">Vokabeln eingeben</button>
        <button data-mode="flashcard">Flashcards</button>
        <button data-mode="quiz">Quiz</button>
        <button data-mode="irregAll">Verben: Alle 3</button>
        <button data-mode="irregGap">Verben: Lücke</button>
    </div>

    <!-- TYPE MODE -->
    <div class="card" id="typeMode" style="display:none">
        <div class="direction" id="typeDir"></div>
        <div class="word" id="typeWord"></div>
        <input type="text" id="typeAnswer" autocomplete="off">
        <div class="feedback" id="typeFeedback"></div>
        <button class="action btn-next" id="typeNext">Next</button>
        <div class="stats">
            <div>Correct: <span class="correct-count" id="typeCorrect">0</span></div>
            <div>Wrong: <span class="wrong-count" id="typeWrong">0</span></div>
        </div>
        <div class="progress" id="typeProgress"></div>
    </div>

    <!-- FLASHCARD MODE -->
    <div class="card" id="flashcardMode" style="display:none">
        <div class="direction" id="flashDir"></div>
        <div class="flashcard-inner" id="flashcardInner">
            <div class="word" id="flashWord"></div>
        </div>
        <button class="action" id="flashShow">Show</button>
        <div class="flashcard-answer" id="flashAnswer"></div>
        <div class="flashcard-nav">
            <button class="btn-didnt" id="flashDidnt">Didn't know</button>
            <button class="btn-knew" id="flashKnew">Knew it</button>
        </div>
        <div class="stats">
            <div>Correct: <span class="correct-count" id="flashCorrect">0</span></div>
            <div>Wrong: <span class="wrong-count" id="flashWrong">0</span></div>
        </div>
        <div class="progress" id="flashProgress"></div>
    </div>

    <!-- QUIZ MODE -->
    <div class="card" id="quizMode" style="display:none">
        <div class="direction" id="quizDir"></div>
        <div class="word" id="quizWord"></div>
        <div class="choices" id="quizChoices"></div>
        <div class="feedback" id="quizFeedback"></div>
        <button class="action btn-next" id="quizNext">Next</button>
        <div class="stats">
            <div>Correct: <span class="correct-count" id="quizCorrect">0</span></div>
            <div>Wrong: <span class="wrong-count" id="quizWrong">0</span></div>
        </div>
        <div class="progress" id="quizProgress"></div>
    </div>

    <!-- IRREGULAR VERBS: ALL 3 -->
    <div class="card" id="irregAllMode" style="display:none">
        <div class="direction">Deutsch → Infinitiv / Past Simple / Past Participle</div>
        <div class="word" id="irregAllWord"></div>
        <div class="verb-inputs" id="irregAllInputs"></div>
        <div class="feedback" id="irregAllFeedback"></div>
        <button class="action btn-next" id="irregAllNext">Next</button>
        <div class="stats">
            <div>Correct: <span class="correct-count" id="irregAllCorrect">0</span></div>
            <div>Wrong: <span class="wrong-count" id="irregAllWrong">0</span></div>
        </div>
        <div class="progress" id="irregAllProgress"></div>
    </div>

    <!-- IRREGULAR VERBS: GAP FILL -->
    <div class="card" id="irregGapMode" style="display:none">
        <div class="direction">Eine Form ist gegeben — fülle die fehlenden aus</div>
        <div class="word" id="irregGapWord"></div>
        <div class="verb-inputs" id="irregGapInputs"></div>
        <div class="feedback" id="irregGapFeedback"></div>
        <button class="action btn-next" id="irregGapNext">Next</button>
        <div class="stats">
            <div>Correct: <span class="correct-count" id="irregGapCorrect">0</span></div>
            <div>Wrong: <span class="wrong-count" id="irregGapWrong">0</span></div>
        </div>
        <div class="progress" id="irregGapProgress"></div>
    </div>

    <!-- RESULTS (shared) -->
    <div class="card results" id="results" style="display:none">
        <h2>Done!</h2>
        <div class="percentage" id="pct"></div>
        <div class="result-detail" id="resultDetail"></div>
        <button class="action" id="restart">Start again</button>
    </div>

    <script>
        const sets = [
            {
                name: "2026-03 Vokabeln",
                words: [
                    ["now", "jetzt"],
                    ["always", "immer"],
                    ["daily", "täglich"],
                    ["monthly", "monatlich"],
                    ["regularly", "regelmäßig"],
                    ["usually", "normalerweise"],
                    ["frequently", "häufig"],
                    ["often", "oft"],
                    ["sometimes", "manchmal"],
                    ["occasionally", "gelegentlich"],
                    ["randomly", "zufällig"],
                    ["rarely", "selten"],
                    ["never", "nie"]
                ]
            },
            {
                name: "2026-03 Vokabeln Set 2",
                words: [
                    ["very", "sehr"],
                    ["too", "zu"],
                    ["almost", "fast"],
                    ["extremely", "äußerst"],
                    ["barely", "kaum"],
                    ["completely", "vollständig"],
                    ["enough", "genug"],
                    ["fairly", "ziemlich"],
                    ["quite", "ziemlich / ganz"],
                    ["rather", "ziemlich / eher"],
                    ["scarcely", "kaum"],
                    ["totally", "völlig"]
                ]
            },
            {
                name: "spooked 2026-03",
                words: [
                    ["to embrace", "umarmen"],
                    ["a cold", "eine Grippe/Erkältung"],
                    ["to ruin", "verfallen/verkommen lassen"],
                    ["dizzy", "benebelt/schwindelig"],
                    ["candlestick", "Kerzenleuchter"],
                    ["to pretend", "so tun als ob/ vorgeben"],
                    ["demolition", "Abriss/ Zerstörung"],
                    ["to fail", "durchfallen"],
                    ["curtain", "Vorhang"],
                    ["crest", "Kamm"],
                    ["spooked", "einen Schrecken einjagen"],
                    ["jealous", "eifersüchtig"],
                    ["splendid", "großartig, wunderbar"],
                    ["squeaky", "quietschig"],
                    ["to reinforce", "verstärken"],
                    ["ancestors", "Vorfahren"]
                ]
            }
        ];

        const irregularVerbs = [
            { de: "klingeln/läuten", forms: ["ring", "rang", "rung"] },
            { de: "suchen", forms: ["seek", "sought", "sought"] },
            { de: "verkaufen", forms: ["sell", "sold", "sold"] },
            { de: "senden/schicken", forms: ["send", "sent", "sent"] },
            { de: "schütteln", forms: ["shake", "shook", "shaken"] },
            { de: "scheinen", forms: ["shine", "shone", "shone"] },
            { de: "schießen", forms: ["shoot", "shot", "shot"] },
            { de: "zeigen", forms: ["show", "showed", "shown/showed"] },
            { de: "schließen", forms: ["shut", "shut", "shut"] },
            { de: "sinken", forms: ["sink", "sank", "sunk"] }
        ];
        const formLabels = ["Infinitiv", "Past Simple", "Past Participle"];

        let currentSetIdx = 'all';
        function getVocab() {
            if (currentSetIdx === 'all') return sets.flatMap(s => s.words);
            return sets[currentSetIdx].words;
        }

        // Build set picker
        const setPicker = document.getElementById('setPicker');
        const setSelect = document.createElement('select');
        const allOpt = document.createElement('option');
        allOpt.value = 'all';
        allOpt.textContent = 'Alles lernen';
        setSelect.appendChild(allOpt);
        sets.forEach((s, i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = s.name;
            setSelect.appendChild(opt);
        });
        setSelect.addEventListener('change', () => {
            currentSetIdx = setSelect.value === 'all' ? 'all' : parseInt(setSelect.value);
            switchMode(currentMode);
        });
        setPicker.appendChild(setSelect);

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function buildQuestions() {
            const questions = [];
            for (const [en, de] of getVocab()) {
                questions.push({ prompt: en, answer: de, dir: "EN → DE" });
                questions.push({ prompt: de, answer: en, dir: "DE → EN" });
            }
            return shuffle(questions);
        }

        function normalize(s) { return s.trim().toLowerCase(); }

        function showResults(correct, wrong, total) {
            document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
            const el = document.getElementById('results');
            el.style.display = '';
            const pct = Math.round((correct / total) * 100);
            document.getElementById('pct').textContent = pct + '%';
            document.getElementById('pct').className = 'percentage ' + (pct >= 80 ? 'good' : pct >= 50 ? 'ok' : 'bad');
            document.getElementById('resultDetail').textContent = `${correct} correct, ${wrong} wrong out of ${total} questions`;
        }

        // ---- MODE: Vokabeln eingeben ----
        let typeState = {};
        function typeStart() {
            typeState = { questions: buildQuestions(), idx: 0, correct: 0, wrong: 0, waiting: false };
            document.getElementById('typeCorrect').textContent = '0';
            document.getElementById('typeWrong').textContent = '0';
            typeShow();
        }
        function typeShow() {
            const q = typeState.questions[typeState.idx];
            document.getElementById('typeDir').textContent = q.dir;
            document.getElementById('typeWord').textContent = q.prompt;
            const inp = document.getElementById('typeAnswer');
            inp.value = ''; inp.className = '';
            document.getElementById('typeFeedback').textContent = '';
            document.getElementById('typeFeedback').className = 'feedback';
            document.getElementById('typeProgress').textContent = `${typeState.idx + 1} / ${typeState.questions.length}`;
            inp.focus();
        }
        function typeAdvance() {
            typeState.idx++;
            if (typeState.idx >= typeState.questions.length) {
                showResults(typeState.correct, typeState.wrong, typeState.questions.length);
            } else {
                typeState.waiting = false;
                typeShow();
            }
        }
        function typeNext() {
            if (!typeState.waiting) {
                typeState.wrong++;
                document.getElementById('typeWrong').textContent = typeState.wrong;
            }
            typeAdvance();
        }
        document.getElementById('typeAnswer').addEventListener('keydown', (e) => {
            if (e.key !== 'Enter') return;
            const inp = document.getElementById('typeAnswer');
            if (typeState.waiting) {
                typeAdvance();
            } else if (inp.value.trim()) {
                const q = typeState.questions[typeState.idx];
                const fb = document.getElementById('typeFeedback');
                if (normalize(inp.value) === normalize(q.answer)) {
                    typeState.correct++;
                    inp.className = 'correct';
                    document.getElementById('typeCorrect').textContent = typeState.correct;
                    fb.textContent = 'Correct!';
                    fb.className = 'feedback correct-feedback';
                } else {
                    typeState.wrong++;
                    inp.className = 'wrong';
                    document.getElementById('typeWrong').textContent = typeState.wrong;
                    fb.textContent = `Wrong! The correct answer is: ${q.answer}`;
                    fb.className = 'feedback wrong-feedback';
                }
                typeState.waiting = true;
            }
        });
        document.getElementById('typeNext').addEventListener('click', typeNext);

        // ---- MODE: Flashcards ----
        let flashState = {};
        function flashStart() {
            flashState = { questions: buildQuestions(), idx: 0, correct: 0, wrong: 0, revealed: false };
            document.getElementById('flashCorrect').textContent = '0';
            document.getElementById('flashWrong').textContent = '0';
            flashShow();
        }
        function flashShow() {
            const q = flashState.questions[flashState.idx];
            document.getElementById('flashDir').textContent = q.dir;
            document.getElementById('flashWord').textContent = q.prompt;
            document.getElementById('flashAnswer').textContent = '';
            document.getElementById('flashShow').style.display = '';
            document.getElementById('flashProgress').textContent = `${flashState.idx + 1} / ${flashState.questions.length}`;
            flashState.revealed = false;
        }
        document.getElementById('flashShow').addEventListener('click', () => {
            if (!flashState.revealed) {
                const q = flashState.questions[flashState.idx];
                document.getElementById('flashAnswer').textContent = q.answer;
                document.getElementById('flashShow').style.display = 'none';
                flashState.revealed = true;
            }
        });
        function flashNext(knew) {
            if (!flashState.revealed) return;
            if (knew) { flashState.correct++; }
            else { flashState.wrong++; }
            document.getElementById('flashCorrect').textContent = flashState.correct;
            document.getElementById('flashWrong').textContent = flashState.wrong;
            flashState.idx++;
            if (flashState.idx >= flashState.questions.length) {
                showResults(flashState.correct, flashState.wrong, flashState.questions.length);
            } else {
                flashShow();
            }
        }
        document.getElementById('flashKnew').addEventListener('click', () => flashNext(true));
        document.getElementById('flashDidnt').addEventListener('click', () => flashNext(false));

        // ---- MODE: Quiz (multiple choice) ----
        let quizState = {};
        function quizStart() {
            quizState = { questions: buildQuestions(), idx: 0, correct: 0, wrong: 0, answered: false };
            document.getElementById('quizCorrect').textContent = '0';
            document.getElementById('quizWrong').textContent = '0';
            quizShow();
        }
        function quizShow() {
            const q = quizState.questions[quizState.idx];
            document.getElementById('quizDir').textContent = q.dir;
            document.getElementById('quizWord').textContent = q.prompt;
            document.getElementById('quizFeedback').textContent = '';
            document.getElementById('quizFeedback').className = 'feedback';
            document.getElementById('quizProgress').textContent = `${quizState.idx + 1} / ${quizState.questions.length}`;
            quizState.answered = false;

            // Build 4 choices: correct + 3 random wrong
            const isEnToDe = q.dir === "EN → DE";
            const allAnswers = getVocab().map(v => isEnToDe ? v[1] : v[0]);
            const wrongAnswers = shuffle(allAnswers.filter(a => normalize(a) !== normalize(q.answer))).slice(0, 3);
            const choices = shuffle([q.answer, ...wrongAnswers]);

            const container = document.getElementById('quizChoices');
            container.innerHTML = '';
            for (const choice of choices) {
                const btn = document.createElement('button');
                btn.textContent = choice;
                btn.addEventListener('click', () => quizAnswer(btn, choice, q.answer));
                container.appendChild(btn);
            }
        }
        function quizAdvance() {
            quizState.idx++;
            if (quizState.idx >= quizState.questions.length) {
                showResults(quizState.correct, quizState.wrong, quizState.questions.length);
            } else {
                quizShow();
            }
        }
        function quizNext() {
            if (!quizState.answered) {
                const q = quizState.questions[quizState.idx];
                quizState.wrong++;
                document.getElementById('quizWrong').textContent = quizState.wrong;
                document.querySelectorAll('#quizChoices button').forEach(b => {
                    b.disabled = true;
                    if (normalize(b.textContent) === normalize(q.answer)) {
                        b.classList.add('choice-correct');
                    }
                });
                quizState.answered = true;
            }
            quizAdvance();
        }
        function quizAnswer(btn, chosen, correctAnswer) {
            if (quizState.answered) return;
            quizState.answered = true;
            const buttons = document.querySelectorAll('#quizChoices button');
            buttons.forEach(b => {
                b.disabled = true;
                if (normalize(b.textContent) === normalize(correctAnswer)) {
                    b.classList.add('choice-correct');
                }
            });
            if (normalize(chosen) === normalize(correctAnswer)) {
                quizState.correct++;
                document.getElementById('quizCorrect').textContent = quizState.correct;
            } else {
                quizState.wrong++;
                document.getElementById('quizWrong').textContent = quizState.wrong;
                btn.classList.add('choice-wrong');
            }
        }
        document.getElementById('quizNext').addEventListener('click', quizNext);

        // ---- MODE: Irregular verbs (shared logic) ----
        function buildVerbQuestions(gapMode) {
            const qs = irregularVerbs.map(v => {
                const q = { de: v.de, forms: v.forms };
                if (gapMode) q.given = Math.floor(Math.random() * 3);
                return q;
            });
            return shuffle(qs);
        }
        function checkForm(input, expected) {
            const accepted = expected.split('/').map(normalize);
            return accepted.includes(normalize(input));
        }
        function makeVerbCard(state, opts) {
            // opts: { containerId, wordId, feedbackId, progressId, correctId, wrongId, gapMode }
            state.idx = 0; state.correct = 0; state.wrong = 0; state.waiting = false;
            state.questions = buildVerbQuestions(opts.gapMode);
            document.getElementById(opts.correctId).textContent = '0';
            document.getElementById(opts.wrongId).textContent = '0';
            renderVerbQuestion(state, opts);
        }
        function renderVerbQuestion(state, opts) {
            const q = state.questions[state.idx];
            document.getElementById(opts.wordId).textContent = q.de;
            const fb = document.getElementById(opts.feedbackId);
            fb.textContent = ''; fb.className = 'feedback';
            document.getElementById(opts.progressId).textContent = `${state.idx + 1} / ${state.questions.length}`;

            const container = document.getElementById(opts.containerId);
            container.innerHTML = '';
            const inputs = [];
            for (let i = 0; i < 3; i++) {
                const row = document.createElement('div');
                row.className = 'verb-input';
                const lbl = document.createElement('label');
                lbl.textContent = formLabels[i];
                row.appendChild(lbl);
                if (opts.gapMode && i === q.given) {
                    const div = document.createElement('div');
                    div.className = 'given';
                    div.textContent = q.forms[i].split('/')[0];
                    row.appendChild(div);
                    inputs.push(null);
                } else {
                    const inp = document.createElement('input');
                    inp.type = 'text'; inp.autocomplete = 'off';
                    inp.addEventListener('keydown', (e) => {
                        if (e.key !== 'Enter') return;
                        if (state.waiting) {
                            advanceVerb(state, opts);
                        } else {
                            // move focus to next empty input, or submit if last
                            const nextIdx = inputs.findIndex((x, j) => j > i && x);
                            if (nextIdx === -1) submitVerb(state, opts, inputs);
                            else inputs[nextIdx].focus();
                        }
                    });
                    row.appendChild(inp);
                    inputs.push(inp);
                }
                container.appendChild(row);
            }
            state.inputs = inputs;
            const first = inputs.find(x => x);
            if (first) first.focus();
        }
        function submitVerb(state, opts, inputs) {
            const q = state.questions[state.idx];
            let allOk = true;
            const wrongList = [];
            for (let i = 0; i < 3; i++) {
                const inp = inputs[i];
                if (!inp) continue;
                const ok = checkForm(inp.value, q.forms[i]);
                inp.className = ok ? 'correct' : 'wrong';
                inp.disabled = true;
                if (!ok) { allOk = false; wrongList.push(`${formLabels[i]}: ${q.forms[i]}`); }
            }
            const fb = document.getElementById(opts.feedbackId);
            if (allOk) {
                state.correct++;
                document.getElementById(opts.correctId).textContent = state.correct;
                fb.textContent = 'Correct!';
                fb.className = 'feedback correct-feedback';
            } else {
                state.wrong++;
                document.getElementById(opts.wrongId).textContent = state.wrong;
                fb.textContent = 'Wrong! ' + wrongList.join(' · ');
                fb.className = 'feedback wrong-feedback';
            }
            state.waiting = true;
            // refocus an enabled-or-disabled input so Enter still works
            const last = inputs.filter(x => x).pop();
            if (last) last.focus();
        }
        function advanceVerb(state, opts) {
            state.idx++;
            state.waiting = false;
            if (state.idx >= state.questions.length) {
                showResults(state.correct, state.wrong, state.questions.length);
            } else {
                renderVerbQuestion(state, opts);
            }
        }
        function nextVerb(state, opts) {
            if (!state.waiting) {
                state.wrong++;
                document.getElementById(opts.wrongId).textContent = state.wrong;
            }
            advanceVerb(state, opts);
        }

        let irregAllState = {};
        const irregAllOpts = {
            containerId: 'irregAllInputs', wordId: 'irregAllWord',
            feedbackId: 'irregAllFeedback', progressId: 'irregAllProgress',
            correctId: 'irregAllCorrect', wrongId: 'irregAllWrong', gapMode: false
        };
        function irregAllStart() { makeVerbCard(irregAllState, irregAllOpts); }
        document.getElementById('irregAllNext').addEventListener('click', () => nextVerb(irregAllState, irregAllOpts));

        let irregGapState = {};
        const irregGapOpts = {
            containerId: 'irregGapInputs', wordId: 'irregGapWord',
            feedbackId: 'irregGapFeedback', progressId: 'irregGapProgress',
            correctId: 'irregGapCorrect', wrongId: 'irregGapWrong', gapMode: true
        };
        function irregGapStart() { makeVerbCard(irregGapState, irregGapOpts); }
        document.getElementById('irregGapNext').addEventListener('click', () => nextVerb(irregGapState, irregGapOpts));

        // ---- Mode switching ----
        let currentMode = 'type';
        const modes = {
            type: 'typeMode', flashcard: 'flashcardMode', quiz: 'quizMode',
            irregAll: 'irregAllMode', irregGap: 'irregGapMode'
        };
        const starters = {
            type: typeStart, flashcard: flashStart, quiz: quizStart,
            irregAll: irregAllStart, irregGap: irregGapStart
        };
        const usesVocabSet = { type: true, flashcard: true, quiz: true, irregAll: false, irregGap: false };

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.menu button').forEach(b => b.classList.remove('active'));
            document.querySelector(`.menu button[data-mode="${mode}"]`).classList.add('active');
            document.getElementById(modes[mode]).style.display = '';
            document.getElementById('setPicker').style.display = usesVocabSet[mode] ? '' : 'none';
            starters[mode]();
        }

        document.querySelectorAll('.menu button').forEach(btn => {
            btn.addEventListener('click', () => switchMode(btn.dataset.mode));
        });

        document.getElementById('restart').addEventListener('click', () => switchMode(currentMode));

        switchMode('type');
    </script>
</body>
</html>
